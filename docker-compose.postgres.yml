# PostgreSQL overlay: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loggerdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loggerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    environment:
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: loggerdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
