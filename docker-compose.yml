# Zero-touch stack: SQLite in-app (no Postgres container). Port 8080 published.
# For PostgreSQL: make docker-up-postgres

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: docker
      APP_PORT: "8080"
      DB_DRIVER: sqlite
      SQLITE_PATH: /data/logger.db
      DB_AUTO_MIGRATE: "true"
      SERVICE_NAME: application-logging-audit-module
      ENABLE_CONSOLE_LOGGING: "true"
      ENABLE_DATABASE_LOGGING: "true"
      LOG_LEVEL: INFO
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "12345678"
      ADMIN_API_KEY: super-secret-admin-key
      JWT_SECRET: change-this-secret
      CORS_ORIGINS: http://localhost:5173
      ENABLE_SWAGGER_UI: "false"
    volumes:
      - sqlite_data:/data
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - app
    restart: on-failure

volumes:
  sqlite_data:
